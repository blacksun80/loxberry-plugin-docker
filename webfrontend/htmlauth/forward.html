<!DOCTYPE html>
<html>
        <head>
                <script>
                        var host = window.location.hostname;
                        // Portainer is published on port 9000 as HTTP only.
                        // Do NOT inherit window.location.protocol here: if the
                        // LoxBerry WebUI runs over HTTPS we would redirect to
                        // https://host:9000, where nothing is listening.
                        var proto = "http:";
                        var port = "9000";

                        var url = proto + "//" + host + ":" + port;

                        window.location = url;
                </script>
        </head>
</html>
